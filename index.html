<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AeroPuzzle - Gesture Controlled Puzzle</title>
  <meta name="description" content="Solve puzzles using air gestures — no mouse or touch needed. Powered by MediaPipe hand tracking.">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- MediaPipe CDN dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <!-- canvas-confetti for win celebration -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <div class="app-container">
    <!-- Minimal top bar: logo + status + timer -->
    <header class="app-header">
      <div class="logo">
        <h1>Aero<span>Puzzle</span></h1>
      </div>
      <div class="game-status-bar">
        <div class="status-indicator" id="tracking-status">
          <span class="status-dot red"></span>
          <span class="status-text">Loading...</span>
        </div>
        <div class="timer" id="game-timer">00:00.00</div>
      </div>
    </header>

    <!-- Two-panel layout: webcam + puzzle -->
    <main class="main-layout">
      <!-- Webcam feed -->
      <section class="panel camera-panel">
        <div class="camera-wrapper">
          <video id="webcam" autoplay playsinline muted style="display: none;"></video>
          <canvas id="camera-overlay"></canvas>
          <div class="camera-placeholder" id="camera-placeholder">
            <p>Starting camera...</p>
          </div>
          <div class="action-prompt" id="action-prompt">
            Position both index fingers to define crop frame...
          </div>
        </div>
      </section>

      <!-- Puzzle canvas -->
      <section class="panel puzzle-panel">
        <div class="puzzle-container">
          <div class="puzzle-grid-wrapper" id="puzzle-grid-wrapper">
            <canvas id="puzzle-canvas"></canvas>
            <div class="puzzle-placeholder" id="puzzle-placeholder">
              <p>Pinch to capture & play</p>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Victory Modal -->
  <div class="modal-overlay" id="victory-modal">
    <div class="modal-content glass-card">
      <h2>Puzzle Solved!</h2>
      <div class="victory-stats">
        <div class="v-stat">
          <span class="v-label">Time</span>
          <span class="v-value" id="victory-time">00:00.00</span>
        </div>
        <div class="v-stat">
          <span class="v-label">Grid</span>
          <span class="v-value" id="victory-grid">3x3</span>
        </div>
      </div>
      <button id="modal-play-again" class="btn btn-primary btn-lg">Play Again</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
